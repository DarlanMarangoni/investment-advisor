services:
  app:
    build: .
    network_mode: host
    container_name: investment-advisor-app
    environment:
      DB_QUOTES_URL: ${DB_QUOTES_URL}
      DB_QUOTES_USERNAME: ${DB_QUOTES_USERNAME}
      DB_QUOTES_PASSWORD: ${DB_QUOTES_PASSWORD}
      DB_ANALYTICS_URL: ${DB_ANALYTICS_URL}
      DB_ANALYTICS_USERNAME: ${DB_ANALYTICS_USERNAME}
      DB_ANALYTICS_PASSWORD: ${DB_ANALYTICS_PASSWORD}
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
      TICKERS: ${TICKERS:-PETR4,VALE3,ITUB4,BBDC4,ABEV3,WEGE3,RENT3,MGLU3}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_ISSUER_URI: ${KEYCLOAK_ISSUER_URI}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
