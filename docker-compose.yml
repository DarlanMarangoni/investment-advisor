services:
  app:
    build: .
    network_mode: host
    container_name: investment-advisor-app
    environment:
      DB_URL: ${DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      BRAPI_TOKEN: ${BRAPI_TOKEN:-}
      TICKERS: ${TICKERS:-PETR4,VALE3,ITUB4,BBDC4,ABEV3,WEGE3,RENT3,MGLU3}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
