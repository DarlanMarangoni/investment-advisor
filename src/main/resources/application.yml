spring:
  application:
    name: investment-advisor
  threads:
    virtual:
      enabled: true
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:investment-advisor}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:change-me}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9080/realms/investment-advisor}
            user-name-attribute: preferred_username
  datasource:
    quotes:
      url: ${DB_QUOTES_URL}
      username: ${DB_QUOTES_USERNAME}
      password: ${DB_QUOTES_PASSWORD}
      driver-class-name: org.postgresql.Driver
    analytics:
      url: ${DB_ANALYTICS_URL}
      username: ${DB_ANALYTICS_USERNAME}
      password: ${DB_ANALYTICS_PASSWORD}
      driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8085

app:
  stocks:
    tickers: ${TICKERS:PETR4,VALE3,ITUB4,BBDC4,ABEV3,WEGE3,RENT3,MGLU3}
  brapi:
    base-url: https://brapi.dev
    token: ${BRAPI_TOKEN:}
    tickers-per-request: ${BRAPI_TICKERS_PER_REQUEST:1}
  scheduler:
    # A cada 15 minutos, segunda a sexta, das 10h às 17h45 (última execução)
    cron: "0 */15 10-17 * * MON-FRI"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    br.com.investmentadvisor: DEBUG

llm:
  provider: deepseek  # ollama | openai | anthropic | gemini | deepseek
  ollama:
    base-url: ${LLM_OLLAMA_BASE_URL:http://localhost:11434}
    model: ${LLM_OLLAMA_MODEL:llama3.1:8b}
  openai:
    api-key: ${OPENAI_API_KEY:}
    model: ${OPENAI_MODEL:gpt-4o-mini}
  anthropic:
    api-key: ${ANTHROPIC_API_KEY:}
    model: ${ANTHROPIC_MODEL:claude-haiku-4-5}
  gemini:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-2.0-flash}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com/v1}
    model: ${DEEPSEEK_MODEL:deepseek-chat}