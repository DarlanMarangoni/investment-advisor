spring:
  application:
    name: investment-advisor
  threads:
    virtual:
      enabled: true
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: ${KEYCLOAK_CLIENT_ID:investment-advisor}
            client-secret: ${KEYCLOAK_CLIENT_SECRET:change-me}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
        provider:
          keycloak:
            issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9080/realms/investment-advisor}
            user-name-attribute: preferred_username
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

server:
  port: 8085

app:
  stocks:
    tickers: ${TICKERS:PETR4,VALE3,ITUB4,BBDC4,ABEV3,WEGE3,RENT3,MGLU3}
  brapi:
    base-url: https://brapi.dev
    token: ${BRAPI_TOKEN:}
    tickers-per-request: ${BRAPI_TICKERS_PER_REQUEST:1}
  scheduler:
    # A cada 15 minutos, segunda a sexta, das 10h às 17h45 (última execução)
    cron: "0 */15 10-17 * * MON-FRI"

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    br.com.investmentadvisor: DEBUG