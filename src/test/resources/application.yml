spring:
  datasource:
    quotes:
      url: jdbc:h2:mem:quotesdb;DB_CLOSE_DELAY=-1
      driver-class-name: org.h2.Driver
      username: sa
      password:
    analytics:
      url: jdbc:h2:mem:analyticsdb;DB_CLOSE_DELAY=-1
      driver-class-name: org.h2.Driver
      username: sa
      password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

app:
  stocks:
    tickers: PETR4,VALE3
  brapi:
    base-url: https://brapi.dev
    token:
    tickers-per-request: 1
  scheduler:
    cron: "0 */15 10-17 * * MON-FRI"
